<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says: Bubble Controls</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: white;
            margin: 0;
            padding: 15px;
            overflow: hidden;
            height: 100vh;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Mode Selector Toggle at the top */
        .mode-selector {
            text-align: center;
            margin-bottom: 10px;
        }

        .mode-btn {
            background-color: #334155;
            border: 2px solid #475569;
            color: #94a3b8;
            padding: 8px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 20px;
            margin: 0 10px;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background-color: #38bdf8;
            border-color: #0284c7;
            color: #0f172a;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }

        /* Top Simon Says Command Banner */
        .simon-banner {
            background-color: #1e293b;
            border: 4px solid #38bdf8;
            border-radius: 20px;
            padding: 15px;
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            transition: opacity 0.3s ease;
        }

        .simon-banner.hidden {
            opacity: 0.2;
            pointer-events: none;
        }

        .simon-avatar {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }

        .command-text {
            font-size: 2.3rem;
            font-weight: bold;
            color: #f0fdf4;
        }

        /* The Bubble Screen (Play Area) */
        .bubble-screen {
            width: 100%;
            max-width: 1200px;
            height: calc(100vh - 330px);
            margin: 15px auto;
            background: linear-gradient(to top, #1e1b4b, #0f172a);
            border: 4px solid #475569;
            border-radius: 25px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
        }

        /* Floating Bubbles */
        .bubble {
            position: absolute;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4) 0%, rgba(56,189,248,0.2) 60%, rgba(236,72,153,0.3) 100%);
            border: 2px solid rgba(255,255,255,0.6);
            border-radius: 50%;
            box-shadow: inset 0 0 20px rgba(255,255,255,0.4), 0 4px 10px rgba(0,0,0,0.2);
            bottom: -100px;
        }

        .bubble.can-pop {
            cursor: pointer;
        }

        /* Bottom Control Panel */
        .control-panel {
            display: flex;
            justify-content: center;
            gap: 15px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Giant Digital Buttons */
        .digital-btn {
            flex: 1;
            max-width: 140px;
            height: 110px;
            background-color: #334155;
            border: 4px solid #64748b;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
            transition: transform 0.1s, background-color 0.2s, border-color 0.2s;
        }

        .digital-btn:active {
            transform: scale(0.92);
        }

        .btn-icon {
            font-size: 2.5rem;
            margin-bottom: 2px;
        }

        .btn-label {
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
            color: #94a3b8;
            text-align: center;
        }

        /* Indicators for Active Media State */
        .digital-btn.active-state {
            background-color: #1e293b;
            border-color: #38bdf8;
        }

        .digital-btn.pop-on {
            background-color: #ec4899;
            border-color: #f472b6;
        }
        .digital-btn.pop-on .btn-label {
            color: white;
        }

        .feedback-pop {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5rem;
            font-weight: bold;
            color: #4caf50;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 10;
        }

        .win-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(15, 23, 42, 0.9);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }

        .win-overlay h2 { font-size: 4rem; color: #4deb6f; margin-bottom: 10px; }
        .win-overlay p { font-size: 2rem; margin-bottom: 20px; }
        
        .play-again-btn {
            padding: 15px 40px; font-size: 1.8rem; font-weight: bold;
            background-color: #38bdf8; border: none; border-radius: 10px; cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Mode Selector -->
    <div class="mode-selector">
        <button id="mode-free" class="mode-btn active" onclick="setMode('free')">Free Play Media Deck</button>
        <button id="mode-simon" class="mode-btn" onclick="setMode('simon')">Simon Says Game</button>
    </div>

    <!-- Simon Banner -->
    <div class="simon-banner hidden" id="banner">
        <img class="simon-avatar" src="simon.png" alt="Simon" onerror="this.src='https://placehold.co/100x100/38bdf8/ffffff?text=📋'">
        <div class="command-text" id="command-display">Free Play Mode Enabled</div>
    </div>

    <!-- Bubble Screen -->
    <div class="bubble-screen" id="screen">
        <div class="feedback-pop" id="success-tick">✔️</div>
        
        <!-- Win Screen Inside Area -->
        <div class="win-overlay" id="win-screen">
            <h2>🏆 Game Complete!</h2>
            <p>You are a Digital Symbol Master!</p>
            <button class="play-again-btn" onclick="resetGame()">Play Again</button>
        </div>
    </div>

    <!-- Media Controls -->
    <div class="control-panel">
        <div id="btn-rewind" class="digital-btn" onclick="handlePress('rewind')">
            <span class="btn-icon">⏪</span><span class="btn-label">Slower</span>
        </div>
        <div id="btn-play" class="digital-btn" onclick="handlePress('play')">
            <span class="btn-icon">▶️</span><span class="btn-label">Play</span>
        </div>
        <div id="btn-pause" class="digital-btn" onclick="handlePress('pause')">
            <span class="btn-icon">⏸️</span><span class="btn-label">Pause</span>
        </div>
        <div id="btn-stop" class="digital-btn" onclick="handlePress('stop')">
            <span class="btn-icon">⏹️</span><span class="btn-label">Stop</span>
        </div>
        <div id="btn-ff" class="digital-btn" onclick="handlePress('ff')">
            <span class="btn-icon">⏩</span><span class="btn-label">Faster</span>
        </div>
        
        <!-- UPDATED TEXT LABELS -->
        <div id="btn-voldown" class="digital-btn" onclick="handlePress('voldown')">
            <span class="btn-icon">🔉</span><span class="btn-label">Volume Down</span>
        </div>
        <div id="btn-volup" class="digital-btn" onclick="handlePress('volup')">
            <span class="btn-icon">🔊</span><span class="btn-label">Volume Up</span>
        </div>
        
        <!-- Pop Toggle Button -->
        <div id="btn-poptoggle" class="digital-btn" onclick="togglePopAbility()">
            <span class="btn-icon" id="pop-icon">🚫</span><span class="btn-label" id="pop-label">Pop Off</span>
        </div>
    </div>

    <!-- Pop Sound Audio Loops Continuously -->
    <audio id="pop-sound" src="pop.mp3" preload="auto" loop></audio>

    <script>
        // UPDATED SIMON INSTRUCTIONS
        const commands = [
            { text: "Simon Says: PLAY the bubbles! ▶️", action: "play" },
            { text: "Simon Says: Turn it down! Press VOLUME DOWN! 🔉", action: "voldown" },
            { text: "Simon Says: FREEZE the bubbles! ⏸️", action: "pause" },
            { text: "Simon Says: Make them GO FASTER! ⏩", action: "ff" },
            { text: "Simon Says: Turn it up! Press VOLUME UP! 🔊", action: "volup" },
            { text: "Simon Says: Make them GO SLOWER... ⏪", action: "rewind" },
            { text: "Simon Says: STOP the bubbles! ⏹️", action: "stop" }
        ];

        let gameMode = "free"; 
        let currentCommandIndex = 0;
        
        let bubbleState = "pause"; 
        let bubbleSpeed = 2; 
        let volumeLevel = 0.5;
        let isAudioPlaying = false;
        let canPopBubbles = false; 

        const screen = document.getElementById('screen');
        const popAudio = document.getElementById('pop-sound');
        const bubblesArray = [];

        function setMode(mode) {
            gameMode = mode;
            document.getElementById('mode-simon').classList.toggle('active', mode === 'simon');
            document.getElementById('mode-free').classList.toggle('active', mode === 'free');
            
            const banner = document.getElementById('banner');
            if (mode === 'free') {
                banner.classList.add('hidden');
                document.getElementById('command-display').innerText = "Free Play Mode Enabled";
            } else {
                banner.classList.remove('hidden');
                document.getElementById('command-display').innerText = commands[currentCommandIndex].text;
            }
            resetGame();
        }

        function togglePopAbility() {
            canPopBubbles = !canPopBubbles;
            
            const btn = document.getElementById('btn-poptoggle');
            const icon = document.getElementById('pop-icon');
            const label = document.getElementById('pop-label');
            
            if (canPopBubbles) {
                btn.classList.add('pop-on');
                icon.innerText = "💥";
                label.innerText = "Pop On";
                document.querySelectorAll('.bubble').forEach(b => b.classList.add('can-pop'));
            } else {
                btn.classList.remove('pop-on');
                icon.innerText = "🚫";
                label.innerText = "Pop Off";
                document.querySelectorAll('.bubble').forEach(b => b.classList.remove('can-pop'));
            }
        }

        function createBubble() {
            if (bubbleState === "stop" || bubbleState === "pause") return;
            if (bubblesArray.length > 25) return; 
            
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            if (canPopBubbles) bubble.className += ' can-pop';
            
            const size = Math.floor(Math.random() * 60) + 40;
            bubble.style.width = `${size}px`;
            bubble.style.height = `${size}px`;
            bubble.style.left = `${Math.random() * (screen.clientWidth - size)}px`;
            
            bubble.onclick = function(e) {
                e.stopPropagation();
                if (!canPopBubbles) return; 
                
                bubble.remove();
                const index = bubblesArray.findIndex(b => b.element === bubble);
                if (index > -1) bubblesArray.splice(index, 1);
            };

            screen.appendChild(bubble);
            bubblesArray.push({
                element: bubble, y: -100, speed: (Math.random() * 1.5) + 0.5
            });
        }

        function updateBubbles() {
            if (bubbleState === "play") {
                for (let i = bubblesArray.length - 1; i >= 0; i--) {
                    const b = bubblesArray[i];
                    b.y += b.speed * bubbleSpeed;
                    b.element.style.bottom = `${b.y}px`;

                    if (b.y > screen.clientHeight) {
                        b.element.remove();
                        bubblesArray.splice(i, 1);
                    }
                }
            }
            requestAnimationFrame(updateBubbles);
        }

        function handlePress(actionPressed) {
            if (!isAudioPlaying) {
                popAudio.volume = volumeLevel;
                popAudio.play().then(() => { isAudioPlaying = true; }).catch(()=>{});
            }

            if (gameMode === "simon") {
                const targetAction = commands[currentCommandIndex].action;
                if (actionPressed === targetAction) {
                    const tick = document.getElementById('success-tick');
                    tick.style.opacity = '1';
                    setTimeout(() => tick.style.opacity = '0', 600);

                    applyDigitalAction(actionPressed);

                    currentCommandIndex++;
                    if (currentCommandIndex < commands.length) {
                        document.getElementById('command-display').innerText = commands[currentCommandIndex].text;
                    } else {
                        document.getElementById('win-screen').style.display = "flex";
                        popAudio.pause(); 
                    }
                }
            } else {
                applyDigitalAction(actionPressed);
            }
        }

        function applyDigitalAction(action) {
            document.querySelectorAll('.control-panel .digital-btn:not(#btn-poptoggle)').forEach(b => b.classList.remove('active-state'));
            
            if (action === "play") {
                bubbleState = "play";
                bubbleSpeed = 2;
                if(isAudioPlaying) popAudio.play();
                document.getElementById('btn-play').classList.add('active-state');
            } else if (action === "pause") {
                bubbleState = "pause";
                if(isAudioPlaying) popAudio.pause();
                document.getElementById('btn-pause').classList.add('active-state');
            } else if (action === "stop") {
                bubbleState = "stop";
                if(isAudioPlaying) popAudio.pause();
                while(bubblesArray.length > 0) {
                    bubblesArray[0].element.remove();
                    bubblesArray.shift();
                }
                document.getElementById('btn-stop').classList.add('active-state');
            } else if (action === "ff") {
                bubbleState = "play";
                bubbleSpeed = 5;
                if(isAudioPlaying) popAudio.play();
                document.getElementById('btn-ff').classList.add('active-state');
            } else if (action === "rewind") {
                bubbleState = "play";
                bubbleSpeed = 0.5;
                if(isAudioPlaying) popAudio.play();
                document.getElementById('btn-rewind').classList.add('active-state');
            } else if (action === "voldown") {
                volumeLevel = Math.max(0, volumeLevel - 0.25);
                popAudio.volume = volumeLevel;
                document.getElementById('btn-voldown').classList.add('active-state');
                setTimeout(() => document.getElementById('btn-voldown').classList.remove('active-state'), 300);
            } else if (action === "volup") {
                volumeLevel = Math.min(1, volumeLevel + 0.25);
                popAudio.volume = volumeLevel;
                document.getElementById('btn-volup').classList.add('active-state');
                setTimeout(() => document.getElementById('btn-volup').classList.remove('active-state'), 300);
            }
        }

        function resetGame() {
            currentCommandIndex = 0;
            bubbleState = "pause"; 
            bubbleSpeed = 2;
            volumeLevel = 0.5;
            popAudio.volume = volumeLevel;
            popAudio.pause();
            isAudioPlaying = false;
            
            canPopBubbles = true;
            togglePopAbility(); 
            
            while(bubblesArray.length > 0) {
                bubblesArray[0].element.remove();
                bubblesArray.shift();
            }

            document.getElementById('win-screen').style.display = "none";
            document.querySelectorAll('.digital-btn').forEach(b => b.classList.remove('active-state'));
            
            if (gameMode === "simon") {
                document.getElementById('command-display').innerText = commands[0].text;
            }
        }

        setInterval(createBubble, 800);

        window.onload = function() {
            resetGame();
            updateBubbles();
        };
    </script>
</body>
</html>
