<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Magical Sensory Sandbox</title>
    <style>
        * {
            box-sizing: border-box;
        }
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050b14;
            font-family: 'Arial', sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Interactive Canvas Drawing Screen */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            cursor: pointer;
        }

        /* Floating Instruction Overlay */
        .instruction-overlay {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.2rem;
            letter-spacing: 1px;
            pointer-events: none; 
            z-index: 2;
            text-shadow: 0 2px 4px rgba(0,0,0,0.7);
        }

        /* PECS Magic Toolbar at the bottom */
        .magic-toolbar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px; /* Slightly widened gap for the larger elements */
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            z-index: 3;
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 95vw;
            overflow-x: auto; /* Gracefully handles layouts on narrower mobile views */
        }

        /* Individual PECS Button Style (Now 160px x 160px) */
        .pecs-btn {
            width: 160px;
            height: 160px;
            background-color: #ffffff;
            border: 5px solid #ccc; /* Chunkier border scales well with size */
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 6px 10px rgba(0,0,0,0.3);
            transition: transform 0.2s, border-color 0.2s;
            padding: 10px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .pecs-btn:hover {
            transform: scale(1.05);
        }

        /* Active/Selected Element Highlight */
        .pecs-btn.active {
            border-color: #00e5ff;
            transform: scale(1.08);
            box-shadow: 0 0 20px #00e5ff;
        }

        /* Your Custom PECS Images Layout (Enlarged to fit nicely) */
        .pecs-btn img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            margin-bottom: 8px;
            pointer-events: none; 
        }

        .pecs-btn .label {
            font-size: 14px; /* Slightly bumped typography to match new scale */
            font-weight: bold;
            text-transform: uppercase;
            color: #333;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="instruction-overlay">Pick a magic power below, then drag your finger! ✨</div>
    <canvas id="magicCanvas"></canvas>

    <div class="magic-toolbar">
        <div class="pecs-btn active" data-element="water">
            <img src="water.png" alt="Water Magic">
            <div class="label">Water</div>
        </div>
        <div class="pecs-btn" data-element="fire">
            <img src="fire.png" alt="Fire Magic">
            <div class="label">Fire</div>
        </div>
        <div class="pecs-btn" data-element="stars">
            <img src="star.png" alt="Star Magic">
            <div class="label">Stars</div>
        </div>
        <div class="pecs-btn" data-element="sand">
            <img src="sand.png" alt="Sand Magic">
            <div class="label">Sand</div>
        </div>
        <div class="pecs-btn" data-element="rainbow">
            <img src="rainbow.png" alt="Rainbow Magic">
            <div class="label">Rainbow</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('magicCanvas');
        const ctx = canvas.getContext('2d');
        const buttons = document.querySelectorAll('.pecs-btn');

        let currentElement = 'water';
        let isDrawing = false;
        const particles = [];
        let hue = 0; 

        // Size Canvas
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Handle Selector Toolbar Clicking
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                buttons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentElement = btn.dataset.element;
            });
        });

        // Universal Particle Blueprint
        class Particle {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.type = type;
                this.size = Math.random() * 4 + 2;
                this.opacity = 1;
                
                if (type === 'water') {
                    this.radius = 0;
                    this.maxRadius = Math.random() * 40 + 60;
                    this.speed = 2;
                    this.waveWidth = 10;
                } else if (type === 'fire') {
                    this.vx = (Math.random() - 0.5) * 3;
                    this.vy = -Math.random() * 4 - 1; 
                    this.size = Math.random() * 12 + 6;
                    this.fadeSpeed = 0.02;
                    this.color = Math.random() > 0.4 ? 'rgba(255, 69, 0,' : 'rgba(255, 165, 0,';
                } else if (type === 'stars') {
                    this.vx = (Math.random() - 0.5) * 2;
                    this.vy = (Math.random() - 0.5) * 2;
                    this.size = Math.random() * 15 + 10;
                    this.angle = Math.random() * Math.PI * 2;
                    this.spin = (Math.random() - 0.5) * 0.05; 
                    this.fadeSpeed = 0.015;
                } else if (type === 'sand') {
                    this.vx = (Math.random() - 0.5) * 1.5;
                    this.vy = Math.random() * 5 + 2; 
                    this.size = Math.random() * 4 + 2;
                    this.fadeSpeed = 0.01;
                } else if (type === 'rainbow') {
                    this.vx = (Math.random() - 0.5) * 2;
                    this.vy = (Math.random() - 0.5) * 2;
                    this.size = Math.random() * 18 + 5;
                    this.fadeSpeed = 0.02;
                    this.hue = hue;
                }
            }

            update() {
                if (this.type === 'water') {
                    this.radius += this.speed;
                    this.opacity = 1 - (this.radius / this.maxRadius);
                } else {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.opacity -= this.fadeSpeed;
                    if (this.type === 'stars') this.angle += this.spin;
                }
            }

            draw() {
                if (this.opacity <= 0) return;

                ctx.save();
                ctx.globalAlpha = this.opacity;

                if (this.type === 'water') {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    let grad = ctx.createRadialGradient(this.x, this.y, Math.max(0, this.radius - this.waveWidth), this.x, this.y, this.radius);
                    grad.addColorStop(0, 'rgba(0, 229, 255, 0)');
                    grad.addColorStop(0.8, 'rgba(0, 229, 255, 0.4)');
                    grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
                    ctx.strokeStyle = grad;
                    ctx.lineWidth = this.waveWidth;
                    ctx.stroke();

                } else if (this.type === 'fire') {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = this.color + this.opacity + ')';
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#ff4500';
                    ctx.fill();

                } else if (this.type === 'stars') {
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.angle);
                    ctx.fillStyle = '#ffdf00';
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#fff79a';
                    ctx.beginPath();
                    for (let i = 0; i < 5; i++) {
                        ctx.lineTo(Math.cos((18 + i * 72) * Math.PI / 180) * this.size, -Math.sin((18 + i * 72) * Math.PI / 180) * this.size);
                        ctx.lineTo(Math.cos((54 + i * 72) * Math.PI / 180) * (this.size/2), -Math.sin((54 + i * 72) * Math.PI / 180) * (this.size/2));
                    }
                    ctx.closePath();
                    ctx.fill();

                } else if (this.type === 'sand') {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = '#e1b36e';
                    ctx.fill();

                } else if (this.type === 'rainbow') {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${this.hue}, 100%, 60%, ${this.opacity})`;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = `hsl(${this.hue}, 100%, 60%)`;
                    ctx.fill();
                }

                ctx.restore();
            }
        }

        // Logic framework to deploy particle emitters
        function spawnMagic(x, y) {
            if (currentElement === 'water') {
                particles.push(new Particle(x, y, 'water'));
            } else if (currentElement === 'fire') {
                for(let i=0; i<3; i++) particles.push(new Particle(x, y, 'fire'));
            } else if (currentElement === 'stars') {
                if(Math.random() > 0.7) particles.push(new Particle(x, y, 'stars'));
            } else if (currentElement === 'sand') {
                for(let i=0; i<4; i++) particles.push(new Particle(x, y, 'sand'));
            } else if (currentElement === 'rainbow') {
                particles.push(new Particle(x, y, 'rainbow'));
            }
        }

        /* --- INPUT RECOGNITION (Touch + Pointer Core) --- */
        function getPos(e) {
            return e.touches ? { x: e.touches[0].clientX, y: e.touches[0].clientY } : { x: e.clientX, y: e.clientY };
        }

        function startAction(e) {
            if (e.target.closest('.magic-toolbar')) return; 
            isDrawing = true;
            const pos = getPos(e);
            spawnMagic(pos.x, pos.y);
        }

        function moveAction(e) {
            if (!isDrawing) return;
            const pos = getPos(e);
            spawnMagic(pos.x, pos.y);
        }

        canvas.addEventListener('mousedown', startAction);
        canvas.addEventListener('mousemove', moveAction);
        window.addEventListener('mouseup', () => isDrawing = false);

        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startAction(e); }, { passive: false });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); moveAction(e); }, { passive: false });
        window.addEventListener('touchend', () => isDrawing = false);

        // Core Rendering Engine Loop
        function animate() {
            ctx.fillStyle = 'rgba(5, 11, 20, 0.2)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            hue += 2; 

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].opacity <= 0) particles.splice(i, 1);
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
