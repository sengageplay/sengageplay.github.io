<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Deluxe Sensory Fireworks</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            touch-action: none;
            cursor: crosshair;
            font-family: sans-serif;
        }

        #hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            -webkit-transform: translate(-50%, -50%);
            color: #444;
            font-size: 24px;
            pointer-events: none;
            user-select: none;
            text-align: center;
        }

        /* The Auto Button */
        #auto-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 15px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 18px;
            border: 2px solid rgba(255,255,255,0.4);
            user-select: none;
        }
        #auto-btn:active { background-color: rgba(255,255,255,0.5); }

        canvas { display: block; }
    </style>
</head>
<body>

    <div id="hint">
        Tap for STARS<br>
        Drag for GLITTER
    </div>
    
    <div id="auto-btn" onclick="toggleAuto()">🤖 Auto: OFF</div>

    <canvas id="canvas"></canvas>

    <script>
        // --- SETUP ---
        var canvas = document.getElementById('canvas');
        var ctx = canvas.getContext('2d');
        var hint = document.getElementById('hint');
        var autoBtn = document.getElementById('auto-btn');
        
        var w = window.innerWidth;
        var h = window.innerHeight;
        canvas.width = w;
        canvas.height = h;

        window.onresize = function() {
            w = window.innerWidth;
            h = window.innerHeight;
            canvas.width = w;
            canvas.height = h;
        };

        // --- STATE ---
        var particles = [];
        var isMouseDown = false;
        var autoMode = false;
        var autoTimer = 0;
        
        var colors = ['#ff0044', '#00ff99', '#00ccff', '#ffff00', '#ff00ff', '#ffffff'];

        // --- HELPER: DRAW STAR ---
        function drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius) {
            var rot = Math.PI / 2 * 3;
            var x = cx;
            var y = cy;
            var step = Math.PI / spikes;

            ctx.beginPath();
            ctx.moveTo(cx, cy - outerRadius);
            for (var i = 0; i < spikes; i++) {
                x = cx + Math.cos(rot) * outerRadius;
                y = cy + Math.sin(rot) * outerRadius;
                ctx.lineTo(x, y);
                rot += step;

                x = cx + Math.cos(rot) * innerRadius;
                y = cy + Math.sin(rot) * innerRadius;
                ctx.lineTo(x, y);
                rot += step;
            }
            ctx.lineTo(cx, cy - outerRadius);
            ctx.closePath();
            ctx.fill();
        }

        // --- PARTICLE CLASS ---
        function Particle(x, y, color, type) {
            this.x = x;
            this.y = y;
            this.color = color;
            this.type = type; // 'big' (star) or 'small' (dot)
            
            var angle = Math.random() * Math.PI * 2;
            
            if (type === 'big') {
                // STARS (Explosion)
                var speed = Math.random() * 7 + 3;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.decay = Math.random() * 0.01 + 0.01;
                this.size = Math.random() * 6 + 4; // Bigger size for stars
                
                // Spin properties
                this.angle = 0;
                this.spinSpeed = (Math.random() - 0.5) * 0.4;
            } else {
                // GLITTER (Trail)
                var speed = Math.random() * 2 + 0.5;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.decay = Math.random() * 0.03 + 0.03; 
                this.size = Math.random() * 2 + 1; // Small dots
            }
            
            this.alpha = 1; 
            this.gravity = 0.15;
        }

        Particle.prototype.update = function() {
            this.x += this.vx;
            this.y += this.vy;
            this.vy += this.gravity;
            this.vx *= 0.95; // Air resistance
            this.vy *= 0.95;
            this.alpha -= this.decay;
            
            if(this.type === 'big') {
                this.angle += this.spinSpeed; // Spin the star
            }
        };

        Particle.prototype.draw = function(ctx) {
            ctx.globalAlpha = this.alpha;
            ctx.fillStyle = this.color;
            
            if (this.type === 'big') {
                // Draw Star
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                // Draw a 5-pointed star
                drawStar(ctx, 0, 0, 5, this.size, this.size / 2);
                ctx.restore();
            } else {
                // Draw Dot (Glitter)
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
            
            ctx.globalAlpha = 1;
        };

        // --- CONTROL ---
        function toggleAuto() {
            // Stop click from triggering a firework
            if (event) event.stopPropagation();
            
            autoMode = !autoMode;
            autoBtn.innerText = autoMode ? "🤖 Auto: ON" : "🤖 Auto: OFF";
            autoBtn.style.backgroundColor = autoMode ? "#27ae60" : "rgba(255,255,255,0.2)";
        }

        function createExplosion(x, y, type) {
            if(hint.style.display !== 'none') hint.style.display = 'none';
            
            var color = colors[Math.floor(Math.random() * colors.length)];
            var count = (type === 'big') ? 40 : 5; 

            for (var i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color, type));
            }
        }

        // --- LOOP ---
        function animate() {
            // Trails
            ctx.fillStyle = 'rgba(0, 0, 0, 0.25)'; 
            ctx.fillRect(0, 0, w, h);

            // Auto Mode Logic
            if (autoMode) {
                // Random chance to fire per frame (creates natural rhythm)
                if (Math.random() < 0.03) { // 3% chance per frame
                    var rx = Math.random() * w * 0.8 + (w * 0.1); // Keep away from edges
                    var ry = Math.random() * h * 0.6 + (h * 0.1);
                    createExplosion(rx, ry, 'big');
                }
            }

            // Update Particles
            for (var i = particles.length - 1; i >= 0; i--) {
                var p = particles[i];
                p.update();
                p.draw(ctx);
                if (p.alpha <= 0) particles.splice(i, 1);
            }
            
            requestAnimationFrame(animate);
        }
        animate(); 

        // --- INPUTS ---
        canvas.addEventListener('mousedown', function(e) {
            isMouseDown = true;
            createExplosion(e.clientX, e.clientY, 'big'); 
        });
        canvas.addEventListener('mouseup', function() { isMouseDown = false; });
        canvas.addEventListener('mousemove', function(e) {
            if(isMouseDown) createExplosion(e.clientX, e.clientY, 'small');
        });

        // Touch
        canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            for (var i = 0; i < e.changedTouches.length; i++) {
                createExplosion(e.changedTouches[i].clientX, e.changedTouches[i].clientY, 'big');
            }
        }, {passive: false});

        canvas.addEventListener('touchmove', function(e) {
            e.preventDefault(); 
            for (var i = 0; i < e.touches.length; i++) {
                createExplosion(e.touches[i].clientX, e.touches[i].clientY, 'small');
            }
        }, {passive: false});

    </script>
</body>
</html>
