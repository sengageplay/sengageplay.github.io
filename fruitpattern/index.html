<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Pattern Masters!</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7f9fc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            user-select: none;
        }

        .header-container {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 { color: #2c3e50; margin: 0 0 10px 0; font-size: 2.5rem; }
        
        .status-bar {
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
        }

        .badge {
            color: white;
            padding: 6px 18px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.1rem;
        }
        .level-badge { background-color: #e67e22; }
        .sub-badge { background-color: #9b59b6; }

        /* Main Menu Grid Setup */
        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: white;
            padding: 40px;
            border-radius: 28px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        .menu-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 20px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
        }

        .menu-btn:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
        }

        /* Home Button in Gameplay */
        .home-btn {
            background-color: #95a5a6;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s;
        }
        .home-btn:hover { background-color: #7f8c8d; }

        /* The Game Track Board (+30px Upgrades Added Here) */
        .pattern-container {
            display: flex;
            align-items: center;
            gap: 15px;
            background: white;
            padding: 30px 40px;
            border-radius: 28px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
            margin-bottom: 40px;
            min-height: 140px;
        }

        /* Slots boosted from 90px to 120px */
        .slot {
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slot img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Targets scaled proportionately to match 120px track slots */
        .blank-target {
            border: 4px dashed #bdc3c7;
            border-radius: 20px;
            font-size: 3rem;
            font-weight: bold;
            color: #bdc3c7;
            background-color: #fafafa;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 112px; 
            height: 112px;
        }

        /* Interactive Choice Panel Choices (+30px Sizing Applied) */
        .choices-container {
            display: flex;
            gap: 25px;
            margin-bottom: 30px;
        }

        /* Buttons boosted from 110px to 140px for easier targeting */
        .choice-btn {
            background: white;
            border: 3px solid #e2e8f0;
            padding: 15px;
            border-radius: 24px;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(0,0,0,0.04);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 140px;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .choice-btn:hover {
            transform: scale(1.1);
            border-color: #2ecc71;
            box-shadow: 0 12px 24px rgba(0,0,0,0.08);
        }

        .choice-btn img {
            width: 115px;
            height: 115px;
            object-fit: contain;
        }

        /* Feedback Alerts */
        .feedback {
            font-size: 1.8rem;
            font-weight: bold;
            min-height: 50px;
            text-align: center;
        }
        .correct { color: #2ecc71; animation: pop 0.3s ease; }
        .incorrect { color: #e74c3c; animation: shake 0.3s ease; }

        .hidden { display: none !important; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <!-- Dynamic Header System -->
    <div class="header-container">
        <h1 id="game-title">Fruit Patterns!</h1>
        <div class="status-bar hidden" id="game-status">
            <div class="badge level-badge" id="level-indicator">Level 1</div>
            <div class="badge sub-badge" id="sub-indicator">Round 1/5</div>
        </div>
    </div>

    <!-- MAIN DASHBOARD MENU SCREEN -->
    <div class="menu-container" id="main-menu">
        <h2>Select a Pattern Mode:</h2>
        <button class="menu-btn" onclick="startLevel(0)">Level 1: Simple Patterns (AB)</button>
        <button class="menu-btn" style="background-color:#9b59b6; box-shadow: 0 5px 15px rgba(155,89,182,0.3);" onclick="startLevel(1)">Level 2: Fruit Salad (ABC)</button>
        <button class="menu-btn" style="background-color:#e67e22; box-shadow: 0 5px 15px rgba(230,126,34,0.3);" onclick="startLevel(2)">Level 3: Double Harvest (AABB)</button>
    </div>

    <!-- ACTIVE GAMEPLAY CONTENT AREA -->
    <div class="pattern-container hidden" id="game-board"></div>
    <div class="choices-container hidden" id="choices-box"></div>
    <div class="feedback" id="feedback-message"></div>
    
    <button class="home-btn hidden" id="menu-back-btn" onclick="showMainMenu()">🏠 Main Menu</button>

    <script>
        // Mapping filenames securely
        const images = {
            apple: 'apple.png',
            orange: 'orange.png',
            watermelon: 'watermelon.png',
            grapes: 'grapes.png',
            banana: 'banana.png',
            cherry: 'cherry.png',
            pineapple: 'pineapple.png',
            raspberry: 'raspberry.png',
            kiwi: 'kiwi.png',
            strawberry: 'strawberry.png'
        };

        // Complete 15 Sub-Level Matrix Configuration Blueprint
        const modes = [
            {
                name: "Level 1: Simple Patterns (AB)",
                subLevels: [
                    { seq: ['apple', 'orange', 'apple', 'orange', 'apple'], ans: 'orange', opt: ['apple', 'orange'] },
                    { seq: ['orange', 'apple', 'orange', 'apple', 'orange'], ans: 'apple', opt: ['apple', 'orange'] },
                    { seq: ['apple', 'orange', 'apple', 'orange', 'apple', 'orange', 'apple'], ans: 'orange', opt: ['apple', 'orange'] },
                    { seq: ['orange', 'orange', 'apple', 'orange', 'orange', 'apple', 'orange'], ans: 'orange', opt: ['apple', 'orange'] }, // Trick variant
                    { seq: ['apple', 'apple', 'orange', 'apple', 'apple', 'orange', 'apple'], ans: 'apple', opt: ['apple', 'orange'] }    // Trick variant
                ]
            },
            {
                name: "Level 2: Fruit Salad (ABC)",
                subLevels: [
                    { seq: ['watermelon', 'grapes', 'banana', 'watermelon', 'grapes'], ans: 'banana', opt: ['watermelon', 'grapes', 'banana'] },
                    { seq: ['banana', 'watermelon', 'grapes', 'banana', 'watermelon'], ans: 'grapes', opt: ['watermelon', 'grapes', 'banana'] },
                    { seq: ['grapes', 'banana', 'watermelon', 'grapes', 'banana'], ans: 'watermelon', opt: ['watermelon', 'grapes', 'banana'] },
                    { seq: ['watermelon', 'watermelon', 'grapes', 'banana', 'watermelon', 'watermelon', 'grapes'], ans: 'banana', opt: ['watermelon', 'grapes', 'banana'] },
                    { seq: ['banana', 'grapes', 'watermelon', 'banana', 'grapes'], ans: 'watermelon', opt: ['watermelon', 'grapes', 'banana'] }
                ]
            },
            {
                name: "Level 3: Double Harvest (AABB)",
                subLevels: [
                    { seq: ['cherry', 'cherry', 'pineapple', 'pineapple', 'cherry', 'cherry', 'pineapple'], ans: 'pineapple', opt: ['cherry', 'pineapple'] },
                    { seq: ['raspberry', 'raspberry', 'kiwi', 'kiwi', 'raspberry', 'raspberry', 'kiwi'], ans: 'kiwi', opt: ['raspberry', 'kiwi'] },
                    { seq: ['pineapple', 'pineapple', 'cherry', 'cherry', 'pineapple', 'pineapple', 'cherry'], ans: 'cherry', opt: ['cherry', 'pineapple'] },
                    { seq: ['kiwi', 'kiwi', 'raspberry', 'raspberry', 'kiwi', 'kiwi', 'raspberry'], ans: 'raspberry', opt: ['raspberry', 'kiwi'] },
                    { seq: ['cherry', 'cherry', 'kiwi', 'kiwi', 'cherry', 'cherry', 'kiwi'], ans: 'kiwi', opt: ['cherry', 'kiwi'] }
                ]
            }
        ];

        let activeModeIndex = 0;
        let activeSubLevelIndex = 0;
        let canInteract = true;

        function showMainMenu() {
            // Screen Toggle Routing State Management
            document.getElementById('main-menu').classList.remove('hidden');
            document.getElementById('game-board').classList.add('hidden');
            document.getElementById('choices-box').classList.add('hidden');
            document.getElementById('game-status').classList.add('hidden');
            document.getElementById('menu-back-btn').classList.add('hidden');
            
            document.getElementById('game-title').textContent = "Fruit Pattern Masters!";
            document.getElementById('feedback-message').textContent = "";
        }

        function startLevel(modeIndex) {
            activeModeIndex = modeIndex;
            activeSubLevelIndex = 0; // Initialize cycle index layout
            
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('game-board').classList.remove('hidden');
            document.getElementById('choices-box').classList.remove('hidden');
            document.getElementById('game-status').classList.remove('hidden');
            document.getElementById('menu-back-btn').classList.remove('hidden');

            loadRound();
        }

        function loadRound() {
            canInteract = true;
            const currentMode = modes[activeModeIndex];
            const activeRound = currentMode.subLevels[activeSubLevelIndex];

            // Render HUD metrics
            document.getElementById('game-title').textContent = currentMode.name;
            document.getElementById('level-indicator').textContent = `Level ${activeModeIndex + 1}`;
            document.getElementById('sub-indicator').textContent = `Round ${activeSubLevelIndex + 1} of 5`;
            document.getElementById('feedback-message').textContent = "";

            // Build Track elements
            const board = document.getElementById('game-board');
            board.innerHTML = '';

            activeRound.seq.forEach(fruitKey => {
                const slot = document.createElement('div');
                slot.className = 'slot';
                slot.innerHTML = `<img src="${images[fruitKey]}" alt="${fruitKey}" onerror="this.style.display='none'; this.parentNode.innerText='${fruitKey.toUpperCase()}'">`;
                board.appendChild(slot);
            });

            // Target Space box construction
            const blankTarget = document.createElement('div');
            blankTarget.className = 'blank-target';
            blankTarget.id = 'mystery-box';
            blankTarget.textContent = '?';
            board.appendChild(blankTarget);

            // Interface Control choice selectors injection
            const choicesBox = document.getElementById('choices-box');
            choicesBox.innerHTML = '';

            const shuffledOptions = [...activeRound.opt].sort(() => Math.random() - 0.5);
            shuffledOptions.forEach(fruitKey => {
                const button = document.createElement('button');
                button.className = 'choice-btn';
                button.onclick = () => handleChoice(fruitKey);
                button.innerHTML = `<img src="${images[fruitKey]}" alt="${fruitKey}" onerror="this.style.display='none'; this.parentNode.innerText='${fruitKey.toUpperCase()}'">`;
                choicesBox.appendChild(button);
            });
        }

        function handleChoice(selectedFruit) {
            if (!canInteract) return;

            const currentMode = modes[activeModeIndex];
            const activeRound = currentMode.subLevels[activeSubLevelIndex];
            const feedback = document.getElementById('feedback-message');
            const mysteryBox = document.getElementById('mystery-box');

            if (selectedFruit === activeRound.ans) {
                canInteract = false;
                feedback.textContent = "🌟 Brilliant! Correct Choice! 🌟";
                feedback.className = "feedback correct";

                mysteryBox.textContent = "";
                mysteryBox.className = "slot";
                mysteryBox.innerHTML = `<img src="${images[selectedFruit]}" alt="Correct match">`;

                setTimeout(() => {
                    activeSubLevelIndex++;
                    if (activeSubLevelIndex < currentMode.subLevels.length) {
                        loadRound();
                    } else {
                        // Level complete screen state
                        document.getElementById('game-board').classList.add('hidden');
                        document.getElementById('choices-box').classList.add('hidden');
                        feedback.className = "feedback correct";
                        feedback.innerHTML = `🏆 Level ${activeModeIndex + 1} Complete! 🏆<br><small>You got 5 out of 5 stars!</small>`;
                    }
                }, 2000);
            } else {
                feedback.textContent = "❌ Try again! Watch the sequence pattern.";
                feedback.className = "feedback incorrect";
            }
        }
    </script>
</body>
</html>
