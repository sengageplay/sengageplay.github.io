<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENgage Play</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121214; /* Calming, low-distraction dark background */
            font-family: 'Segoe UI', system-ui, sans-serif;
            text-align: center;
        }

        header {
            padding: 25px 20px;
            background-color: #1a1a1e;
            border-bottom: 4px solid #4ade80; /* Friendly green accent anchor */
        }

        header h1 {
            margin: 0;
            font-size: 2.6rem;
            color: #ffffff;
        }

        header p {
            margin: 8px 0 0;
            color: #a1a1aa;
            font-size: 1.3rem;
            font-weight: 500;
        }

        /* Fixed 4-column Grid Layout */
        .arcade-grid {
            display: grid;
            /* Force exactly 4 columns on larger screens, scaling down to 2 or 1 on small phones */
            grid-template-columns: repeat(4, 1fr);
            gap: 25px; /* Slightly wider gap for larger tiles */
            max-width: 1000px; /* Snugs the grid neatly in the middle of the screen */
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Responsive tweak for smaller screens (tablets/phones) */
        @media (max-width: 768px) {
            .arcade-grid {
                grid-template-columns: repeat(2, 1fr); /* 2x10 grid on mobile */
            }
        }

        .game-card {
            background-color: #ffffff; /* Clean white card background to match PECS style */
            border-radius: 20px; /* Slightly rounder edges for larger tiles */
            overflow: hidden;
            text-decoration: none;
            border: 5px solid #27272a; /* Thicker border for a chunky, satisfying feel */
            transition: transform 0.15s ease-in-out, border-color 0.15s ease-in-out;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            
            aspect-ratio: 1 / 1; /* Forces the card to stay a perfect square */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* High-contrast border feedback when highlighted or hovered */
        .game-card:hover, .game-card:focus {
            transform: scale(1.05);
            border-color: #4ade80; /* Turns bright green */
            outline: none;
        }

        .game-card img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Ensures the whole customized card fits perfectly inside */
            padding: 15px; /* Breathing room for the custom text/image */
            box-sizing: border-box;
            background-color: #ffffff;
        }
    </style>
</head>
