<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENgage Play</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121214; /* Calming, low-distraction dark background */
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #fff;
            text-align: center;
        }

        header {
            padding: 25px 20px;
            background-color: #1a1a1e;
            border-bottom: 4px solid #4ade80; /* Friendly green accent anchor */
        }

        header h1 {
            margin: 0;
            font-size: 2.6rem;
            color: #ffffff;
        }

        header p {
            margin: 8px 0 0;
            color: #a1a1aa;
            font-size: 1.3rem;
            font-weight: 500;
        }

        .arcade-grid {
            display: grid;
            /* Slightly larger minimum tile size (160px) for easier clicking/tapping */
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .game-card {
            background-color: #ffffff; /* Clean white card background to match PECS style */
            border-radius: 16px;
            overflow: hidden;
            text-decoration: none;
            color: #121214; /* Dark text for high contrast on white cards */
            border: 4px solid #27272a;
            transition: transform 0.15s ease-in-out, border-color 0.15s ease-in-out;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
            
            aspect-ratio: 1 / 1; 
            display: flex;
            flex-direction: column;
        }

        /* Clear, easy interactive focus response */
        .game-card:hover, .game-card:focus {
            transform: scale(1.05);
            border-color: #4ade80; /* Turns bright green when hovered/selected */
            outline: none;
        }

        .game-card img {
            width: 100%;
            height: 75%;
            object-fit: contain; /* Prevents symbols from clipping or stretching */
            padding: 10px; /* Gives the symbol breathing room inside the tile */
            box-sizing: border-box;
            background-color: #ffffff;
        }

        .game-title {
            height: 25%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: bold;
            padding: 5px;
            background-color: #f4f4f5; /* Light grey bottom strip for text legibility */
            border-top: 2px solid #e4e4e7;
        }
    </style>
</head>
<body>

    <header>
        <h1>SENgage Play</h1>
        <p>Games for SEND Children</p>
    </header>

    <div class="arcade-grid">

        <!-- GAME CARD 1: Connects your play.png symbol and your game link -->
        <a href="https://link-to-your-game-from-previous-chat.com" class="game-card">
            <img src="images/play.png" alt="Play Symbol">
            <div class="game-title">Space Blaster</div>
        </a>

    </div>

</body>
</html>
