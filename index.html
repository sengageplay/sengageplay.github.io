<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sengage - Communication Control Deck</title>
    <style>
        :root {
            --card-bg: #ffffff;
            --card-border: #334155;
            --text-dark: #0f172a;
            --screen-bg: #1e1b4b;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #0f172a;
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Top Header Area for Sengage */
        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            margin: 0 0 5px 0;
            font-size: 2.5rem;
            color: #38bdf8;
        }

        /* Main Play/Display Canvas */
        .display-canvas {
            width: 100%;
            max-width: 1200px;
            height: 40vh;
            background: linear-gradient(to top, var(--screen-bg), #0f172a);
            border: 4px solid #475569;
            border-radius: 20px;
            margin-bottom: 25px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.6);
            position: relative;
        }

        /* PECS / ARASAAC Grid Layout */
        .pecs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            width: 100%;
            max-width: 1200px;
            padding: 10px;
            box-sizing: border-box;
        }

        /* Authentic ARASAAC Styled Grid Item Box */
        .pecs-card {
            background-color: var(--card-bg);
            border: 5px solid var(--card-border);
            border-radius: 16px;
            aspect-ratio: 1 / 1; /* Ensures perfect square like physical PECS boards */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            box-sizing: border-box;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
            transition: transform 0.1s ease, border-color 0.2s;
        }

        .pecs-card:active {
            transform: scale(0.95);
        }

        /* Placeholder image area where your ARASAAC assets will link */
        .pecs-image {
            width: 75%;
            height: 75%;
            object-fit: contain;
            pointer-events: none;
        }

        /* Bottom text strip mimicking ARASAAC user configurations */
        .pecs-label {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--text-dark);
            text-transform: uppercase;
            text-align: center;
            width: 100%;
            border-top: 2px solid #e2e8f0;
            padding-top: 6px;
            letter-spacing: 0.5px;
        }

        /* Interactive Focus Highlights */
        .pecs-card.active-state {
            border-color: #0284c7;
            background-color: #bae6fd;
        }
    </style>
</head>
<body>

    <header>
        <h1>Sengage Deck</h1>
    </header>

    <div class="display-canvas" id="main-screen"></div>

    <div class="pecs-grid">
        
        <div class="pecs-card" onclick="triggerAction('slower')">
            <img class="pecs-image" src="https://api.arasaac.org/api/pictograms/3418" alt="Slower">
            <span class="pecs-label">Slower</span>
        </div>

        <div class="pecs-card" onclick="triggerAction('play')">
            <img class="pecs-image" src="https://api.arasaac.org/api/pictograms/2448" alt="Play">
            <span class="pecs-label">Play</span>
        </div>

        <div class="pecs-card" onclick="triggerAction('pause')">
            <img class="pecs-image" src="https://api.arasaac.org/api/pictograms/7504" alt="Pause">
            <span class="pecs-label">Pause</span>
        </div>

        <div class="pecs-card" onclick="triggerAction('stop')">
            <img class="pecs-image" src="https://api.arasaac.org/api/pictograms/2849" alt="Stop">
            <span class="pecs-label">Stop</span>
        </div>

        <div class="pecs-card" onclick="triggerAction('faster')">
            <img class="pecs-image" src="https://api.arasaac.org/api/pictograms/10313" alt="Faster">
            <span class="pecs-label">Faster</span>
        </div>

        <div class="pecs-card" onclick="triggerAction('vol-down')">
            <img class="pecs-image" src="https://api.arasaac.org/api/pictograms/8172" alt="Volume Down">
            <span class="pecs-label">Volume -</span>
        </div>

        <div class="pecs-card" onclick="triggerAction('vol-up')">
            <img class="pecs-image" src="https://api.arasaac.org/api/pictograms/8171" alt="Volume Up">
            <span class="pecs-label">Volume +</span>
        </div>

    </div>

    <script>
        function triggerAction(action) {
            console.log("Action triggered on deck:", action);
            // This is where our game logic connects on the main page!
        }
    </script>
</body>
</html>
